version: "3.9"

networks:
  skilldna-net:
    driver: bridge

volumes:
  postgres_users_data:
  postgres_careertwin_data:
  redis_data:
  kafka_data:
  zookeeper_data:

services:

  # ── Infrastructure ─────────────────────────────────────────────────

  postgres-users:
    image: postgres:16-alpine
    container_name: skilldna-postgres-users
    environment:
      POSTGRES_DB: skilldna_users
      POSTGRES_USER: skilldna
      POSTGRES_PASSWORD: skilldna_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    networks:
      - skilldna-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilldna -d skilldna_users"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-careertwin:
    image: postgres:16-alpine
    container_name: skilldna-postgres-careertwin
    environment:
      POSTGRES_DB: skilldna_careertwin
      POSTGRES_USER: skilldna
      POSTGRES_PASSWORD: skilldna_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_careertwin_data:/var/lib/postgresql/data
    networks:
      - skilldna-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilldna -d skilldna_careertwin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skilldna-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skilldna-net
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: skilldna-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - skilldna-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: skilldna-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - skilldna-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: skilldna-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: skilldna-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - skilldna-net

  # ── Backend Microservices ──────────────────────────────────────────

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: skilldna-api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 8081
      CAREER_TWIN_HOST: career-twin-service
      CAREER_TWIN_PORT: 8082
      PREDICTION_HOST: prediction-service
      PREDICTION_PORT: 8083
      SIMULATION_HOST: simulation-service
      SIMULATION_PORT: 8084
      JOB_MARKET_HOST: job-market-service
      JOB_MARKET_PORT: 8085
      LEARNING_HOST: learning-service
      LEARNING_PORT: 8086
      NOTIFICATION_HOST: notification-service
      NOTIFICATION_PORT: 8087
    networks:
      - skilldna-net
    depends_on:
      - user-service
      - career-twin-service
      - prediction-service

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: skilldna-user-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres-users
      DB_PORT: 5432
      DB_NAME: skilldna_users
      DB_USER: skilldna
      DB_PASSWORD: skilldna_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  career-twin-service:
    build:
      context: ./backend/career-twin-service
      dockerfile: Dockerfile
    container_name: skilldna-career-twin-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres-careertwin
      DB_PORT: 5432
      DB_NAME: skilldna_careertwin
      DB_USER: skilldna
      DB_PASSWORD: skilldna_pass
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      postgres-careertwin:
        condition: service_healthy
      redis:
        condition: service_healthy

  prediction-service:
    build:
      context: ./backend/prediction-service
      dockerfile: Dockerfile
    container_name: skilldna-prediction-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      redis:
        condition: service_healthy

  simulation-service:
    build:
      context: ./backend/simulation-service
      dockerfile: Dockerfile
    container_name: skilldna-simulation-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      redis:
        condition: service_healthy

  job-market-service:
    build:
      context: ./backend/job-market-service
      dockerfile: Dockerfile
    container_name: skilldna-job-market-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      redis:
        condition: service_healthy

  learning-service:
    build:
      context: ./backend/learning-service
      dockerfile: Dockerfile
    container_name: skilldna-learning-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: skilldna-notification-service
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      REDIS_HOST: redis
      KAFKA_SERVERS: kafka:29092
      JWT_SECRET: SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!
    networks:
      - skilldna-net
    depends_on:
      redis:
        condition: service_healthy
