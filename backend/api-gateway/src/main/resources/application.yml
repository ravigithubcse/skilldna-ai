spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - StripPrefix=0

        - id: career-twin-service
          uri: http://${CAREER_TWIN_HOST:localhost}:${CAREER_TWIN_PORT:8082}
          predicates:
            - Path=/api/v1/career-twin/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: prediction-service
          uri: http://${PREDICTION_HOST:localhost}:${PREDICTION_PORT:8083}
          predicates:
            - Path=/api/v1/predictions/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: simulation-service
          uri: http://${SIMULATION_HOST:localhost}:${SIMULATION_PORT:8084}
          predicates:
            - Path=/api/v1/simulations/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: job-market-service
          uri: http://${JOB_MARKET_HOST:localhost}:${JOB_MARKET_PORT:8085}
          predicates:
            - Path=/api/v1/job-markets/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: learning-service
          uri: http://${LEARNING_HOST:localhost}:${LEARNING_PORT:8086}
          predicates:
            - Path=/api/v1/learnings/**
          filters:
            - StripPrefix=0
            - name: JwtAuthFilter

        - id: notification-service
          uri: http://${NOTIFICATION_HOST:localhost}:${NOTIFICATION_PORT:8087}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:SkillDNA-AI-Super-Secret-Key-Min-32-Chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.ravifl.skilldna: INFO
    org.springframework.cloud.gateway: WARN
